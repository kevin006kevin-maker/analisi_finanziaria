name: Aggiornamento autonomo occasioni

# Gira sui server di GitHub (anche a PC spento). Il cron è "best-effort":
# GitHub può ritardare o saltare qualche giro sotto carico, ma per seguire
# l'evoluzione su più giorni va benissimo.
on:
  schedule:
    - cron: "*/15 * * * *"   # ogni 15 minuti
  workflow_dispatch:           # avvio manuale dalla scheda "Actions"
    inputs:
      test_notifica:
        description: "Invia solo una notifica Telegram di prova (per verificare la configurazione)"
        type: boolean
        default: false

permissions:
  contents: write              # serve per pubblicare i dati sul branch auto-data

concurrency:
  group: auto-watch
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Prepara Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installa le dipendenze
        run: pip install -r requirements.txt

      - name: Aggiorna le occasioni (scan + osservazioni + promozione)
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          DATA_REPO: ${{ github.repository }}
          DATA_BRANCH: auto-data
          DATA_LOCAL_FIRST: "1"
          # Token automatico di Actions (permesso contents:write dal blocco "permissions"):
          # con questo lo script salva i dati DIRETTAMENTE sul branch via API GitHub (come fa
          # l'app), in modo affidabile. Sostituisce il vecchio git-push (che falliva → le
          # promozioni venivano notificate ma mai salvate, causando notifiche duplicate).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TEST_NOTIFICA: ${{ inputs.test_notifica }}
        run: python auto_watch.py

      # I dati vengono ora salvati sul branch auto-data DIRETTAMENTE dallo script (via API
      # GitHub, passo precedente) usando GITHUB_TOKEN. Non serve più il vecchio git-push
      # con branch orfano (che falliva e impediva alle promozioni di essere salvate).
      - name: Conferma persistenza
        if: ${{ !inputs.test_notifica }}
        run: echo "Persistenza dati gestita dallo script via API GitHub (branch auto-data)."
